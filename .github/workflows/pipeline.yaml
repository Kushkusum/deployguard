name: DeployGuard CI/CD

on:
  push:
    branches: [main]

env:
  # GHCR requires lowercase repository names; github.repository_owner preserves
  # the account's actual casing (Kushkusum), so it's hardcoded lowercase here.
  IMAGE_NAME: ghcr.io/kushkusum/orders

jobs:
  build-test-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps and run tests
        working-directory: ./services/orders
        run: |
          pip install -r requirements.txt
          pytest

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ./services/orders
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.IMAGE_NAME }}:latest

  deploy-canary:
    needs: build-test-push
    runs-on: self-hosted
    defaults:
      run:
        shell: pwsh
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build image locally and import into k3d
        # Deliberately built locally rather than `docker pull`-ed from GHCR.
        # Docker Desktop's containerd image store has a bug where pulled (not
        # locally-built) images lose track of layer content on export, which
        # breaks both `docker save`/`k3d image import` and even a plain
        # `docker push` to a local registry. Locally-built images don't hit
        # this — GHCR still gets the cloud-built image as the canonical
        # versioned artifact, it's just not the source for local deployment.
        run: |
          docker build -t orders:canary-latest ./services/orders
          k3d image import orders:canary-latest -c deployguard

      - name: Update canary deployment
        run: |
          kubectl set image deployment/orders-canary orders=orders:canary-latest
          # kubectl set image is a no-op when the tag string is unchanged (it
          # always is here - every run reuses "orders:canary-latest"), even
          # though the underlying image content is new each time. Confirmed
          # by testing: without this restart, pods keep running stale code
          # indefinitely after the very first deploy. rollout restart forces
          # pod recreation regardless of whether the tag string changed.
          kubectl rollout restart deployment/orders-canary
          kubectl rollout status deployment/orders-canary

      - name: Port-forward Prometheus (background)
        run: |
          Start-Process -NoNewWindow -FilePath "kubectl" -ArgumentList "port-forward svc/prometheus-svc 9090:9090"
          Start-Sleep -Seconds 5

      - name: Run DeployGuard agent gate
        id: gate
        working-directory: ./agent
        run: |
          pip install -r requirements.txt
          python pipeline_gate.py

      - name: Promote canary
        if: steps.gate.outputs.decision == 'promote'
        run: |
          kubectl scale deployment/orders-canary --replicas=9
          kubectl scale deployment/orders-stable --replicas=1
          Write-Host "Promoted canary to full traffic."

      - name: Rollback canary
        if: steps.gate.outputs.decision == 'rollback'
        run: |
          kubectl rollout undo deployment/orders-canary
          Write-Host "Rolled back canary deployment."

      - name: Hold
        if: steps.gate.outputs.decision == 'hold'
        run: |
          Write-Host "Holding - no traffic shift, more data needed before deciding."

      - name: Upload incident report
        uses: actions/upload-artifact@v4
        with:
          name: incident-report
          path: agent/incident_report.md
