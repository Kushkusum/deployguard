name: DeployGuard CI/CD

on:
  push:
    branches: [main]

env:
  # GHCR requires lowercase repository names; github.repository_owner preserves
  # the account's actual casing (Kushkusum), so it's hardcoded lowercase here.
  IMAGE_NAME: ghcr.io/kushkusum/orders

jobs:
  build-test-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps and run tests
        working-directory: ./services/orders
        run: |
          pip install -r requirements.txt
          pytest

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ./services/orders
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.IMAGE_NAME }}:latest

  deploy-canary:
    needs: build-test-push
    runs-on: self-hosted
    defaults:
      run:
        shell: pwsh
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Pull latest image into k3d
        run: |
          docker pull ${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker tag ${{ env.IMAGE_NAME }}:${{ github.sha }} orders:canary-latest
          k3d image import orders:canary-latest -c deployguard

      - name: Update canary deployment
        run: |
          kubectl set image deployment/orders-canary orders=orders:canary-latest
          kubectl rollout status deployment/orders-canary

      - name: Gate placeholder — agent decision comes here (Day 4/5)
        run: |
          Write-Host "TODO: call DeployGuard agent, decide promote/rollback/hold"
          Write-Host "For now, treating as auto-promote so the pipeline completes"
