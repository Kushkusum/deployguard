apiVersion: apps/v1
kind: Deployment
metadata:
  name: orders-stable
  labels:
    app: orders
    track: stable
spec:
  replicas: 9
  selector:
    matchLabels:
      app: orders
      track: stable
  template:
    metadata:
      labels:
        app: orders
        track: stable
    spec:
      containers:
        - name: orders
          image: orders:v1
          imagePullPolicy: Never
          ports:
            - containerPort: 8000
          env:
            - name: REDIS_HOST
              value: redis
            - name: BUG_MODE
              value: "false"
