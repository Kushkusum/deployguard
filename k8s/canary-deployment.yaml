apiVersion: apps/v1
kind: Deployment
metadata:
  name: orders-canary
  labels:
    app: orders
    track: canary
spec:
  replicas: 1
  selector:
    matchLabels:
      app: orders
      track: canary
  template:
    metadata:
      labels:
        app: orders
        track: canary
    spec:
      containers:
        - name: orders
          image: orders:v2
          imagePullPolicy: Never
          ports:
            - containerPort: 8000
          env:
            - name: REDIS_HOST
              value: redis
            - name: BUG_MODE
              value: "true"
